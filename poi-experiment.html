<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLQ Murcia - POI Experiment</title>
  <script src="api-base.js"></script>
  <!-- Garde d'accès : code d'activation requis (clq_short_code), comme le reste de l'app -->
  <script src="js/access-guard.js" defer></script>
  <script src="translations/translationManager.js"></script>
  <script src="translations/languageSelector.js"></script>
  <script src="api-key.js"></script>
  <style>
    :root {
      --red: #b30000;
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #161616;
      --muted: #666666;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--card);
      border-bottom: 1px solid #dedede;
      padding: 12px 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .controls {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    select, button {
      border: 1px solid #c8c8c8;
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      font-size: 0.92rem;
    }
    #go-btn {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
      cursor: pointer;
      align-self: flex-start;
      white-space: normal;
      max-width: 100%;
    }
    .back-main-btn {
      background: #14365c;
      color: #fff;
      border: 1px solid #14365c;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
    }
    .back-main-btn:hover {
      background: #1e4d7a;
    }
    .header-go-poi-btn {
      background: var(--red);
      color: #fff;
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      white-space: normal;
      max-width: 100%;
    }
    .header-go-poi-btn:hover:not(:disabled) {
      filter: brightness(1.06);
    }
    .header-go-poi-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .poi-propose-btn {
      background: #14365c;
      color: #fff;
      border: 1px solid #14365c;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
    }
    .poi-propose-btn:hover { background: #1e4d7a; }
    .poi-propose-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
    }
    .poi-propose-modal.open { display: block; }
    .poi-propose-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }
    .poi-propose-dialog {
      position: relative;
      max-width: 420px;
      margin: 8vh auto;
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      max-height: 86vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .poi-propose-dialog h2 { margin: 0 0 10px; font-size: 1.05rem; }
    .poi-propose-dialog label {
      display: block;
      font-size: 0.82rem;
      margin: 10px 0 4px;
      font-weight: 600;
    }
    .poi-propose-dialog input,
    .poi-propose-dialog textarea {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px;
      font-size: 0.9rem;
    }
    .poi-propose-dialog textarea { min-height: 72px; resize: vertical; }
    .poi-propose-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .poi-propose-row button { flex: 1 1 auto; }
    .poi-propose-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .poi-propose-actions button[type="submit"] {
      flex: 1;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .poi-propose-actions #poi-propose-cancel {
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .poi-propose-pick-hint {
      display: none;
      color: var(--red);
      font-size: 0.82rem;
      margin: 6px 0 0;
    }
    #poi-propose-mini-map {
      display: none;
      width: 100%;
      height: 220px;
      margin: 8px 0 4px;
      border-radius: 8px;
      border: 2px solid #1565c0;
      overflow: hidden;
      background: #e8e8e8;
    }
    #poi-propose-mini-map.poi-propose-mini-map--active {
      display: block;
    }
    #poi-propose-error { color: #9a0000; font-size: 0.85rem; margin-top: 8px; }
    #poi-propose-success { color: #1a7f37; font-size: 0.85rem; margin-top: 8px; }
    .tour-return-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .tour-return-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e8e8e8;
    }
    #tour-saved-summary {
      margin: 0;
      flex: 1 1 200px;
      font-size: 0.88rem;
    }
    main {
      display: grid;
      grid-template-columns: 1fr 360px;
      grid-template-rows: minmax(0, 1fr);
      gap: 12px;
      padding: 12px;
      height: calc(100vh - 94px);
    }
    .map-area {
      position: relative;
      min-height: 420px;
      height: 100%;
      min-width: 0;
    }
    #poi-map {
      background: #e6e6e6;
      border-radius: 10px;
      width: 100%;
      height: 100%;
      border: 1px solid #d8d8d8;
      overflow: hidden;
    }
    .poi-detail-view {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: var(--card);
      border: 1px solid #d8d8d8;
      border-radius: 10px;
      overflow: hidden;
    }
    main.poi-detail-open .poi-detail-view {
      display: flex;
    }
    main.poi-detail-open #poi-map {
      display: none;
    }
    .poi-detail-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #e8e8e8;
      background: #fafafa;
    }
    .poi-detail-close {
      background: #14365c;
      color: #fff;
      border: 1px solid #14365c;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .poi-detail-close:hover {
      background: #1e4d7a;
    }
    .poi-detail-columns {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.15fr);
      gap: 12px;
      padding: 10px 12px 12px;
    }
    .poi-detail-media {
      min-height: 0;
      min-width: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 8px;
      border: 1px solid #e0e0e0;
    }
    .poi-detail-media img {
      width: 100%;
      height: auto;
      max-height: min(52vh, 420px);
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      display: block;
    }
    .poi-detail-scroll {
      min-height: 0;
      min-width: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-right: 4px;
    }
    #poi-detail-view .poi-detail-gallery-extra {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }
    #poi-detail-view .poi-detail-gallery-extra img {
      width: 100%;
      height: auto;
      max-height: 120px;
      object-fit: cover;
      border-radius: 6px;
    }
    .panel {
      background: var(--card);
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }
    #visible-count {
      font-weight: 700;
      font-size: 0.92rem;
    }
    #poi-list {
      display: grid;
      gap: 6px;
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      overflow: auto;
      padding-right: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .poi-list-item {
      text-align: left;
      cursor: pointer;
      border-radius: 7px;
      border: 1px solid #e0e0e0;
      background: #fff;
      padding: 7px 8px;
      font-size: 0.82rem;
      line-height: 1.25;
    }
    .poi-list-item--active {
      border-color: #1565c0;
      background: #e8f4fc;
      box-shadow: 0 0 0 2px rgba(255, 235, 59, 0.65);
      animation: poi-list-pulse 1.2s ease-in-out infinite;
    }
    @keyframes poi-list-pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(255, 235, 59, 0.45); }
      50% { box-shadow: 0 0 0 4px rgba(21, 101, 192, 0.35); }
    }
    #poi-title {
      margin: 0 0 8px;
      font-size: 1.05rem;
      line-height: 1.25;
    }
    .meta {
      color: var(--muted);
      font-size: 0.86rem;
      margin: 0 0 8px;
    }
    #poi-desc {
      margin: 0 0 12px;
      line-height: 1.45;
      font-size: 0.95rem;
    }
    .poi-cta-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      margin-bottom: 10px;
    }
    .maps-return-hint {
      margin: 0;
      font-size: 0.78rem;
      line-height: 1.35;
      max-width: 280px;
    }
    .muted { color: var(--muted); font-size: 0.85rem; }
    .error { color: #9a0000; padding: 12px; }
    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) auto;
        height: calc(100vh - 120px);
        min-height: 320px;
      }
      .map-area {
        min-height: min(48vh, 420px);
      }
      main.poi-detail-open .map-area {
        min-height: min(62vh, 520px);
      }
      .panel {
        max-height: 38vh;
        flex-shrink: 0;
      }
      #poi-list {
        max-height: 22vh;
      }
      .poi-detail-columns {
        grid-template-columns: minmax(0, 42%) minmax(0, 58%);
        gap: 8px;
        padding: 8px;
      }
      #poi-title {
        font-size: 0.98rem;
      }
      #poi-desc {
        font-size: 0.9rem;
      }
      #go-btn {
        width: 100%;
        box-sizing: border-box;
      }
    }
    @media (max-width: 900px) and (orientation: landscape) {
      main {
        grid-template-columns: 1fr 280px;
        grid-template-rows: minmax(0, 1fr);
      }
      .panel {
        max-height: none;
      }
      #poi-list {
        max-height: 40vh;
      }
    }
    #clq-maps-return-banner {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      z-index: 20000;
      padding: 14px 16px;
      border-radius: 10px;
      background: #1a7f37;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      transform: translateY(120%);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      pointer-events: none;
    }
    #clq-maps-return-banner.clq-maps-return-banner--visible {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <header>
    <h1>CLQ Murcia - POI Explorer (experiment local)</h1>
    <div class="controls">
      <label for="radius-select" id="label-radius">Rayon (km)</label>
      <select id="radius-select">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="40">40</option>
        <option value="50">50</option>
      </select>
      <!-- Sync langue pour scripts / anciennes versions ; masqué (UI = languageSelector). -->
      <select id="language-select" aria-hidden="true" tabindex="-1" style="position:absolute;clip:rect(0 0 0 0);width:1px;height:1px;margin:-1px;overflow:hidden;border:0;padding:0">
        <option value="fr">FR</option>
        <option value="en">EN</option>
        <option value="nl">NL</option>
        <option value="de">DE</option>
        <option value="it">IT</option>
        <option value="es">ES</option>
        <option value="pl">PL</option>
        <option value="ar">AR</option>
        <option value="zh">中文</option>
        <option value="ja">日本語</option>
        <option value="cn">中文</option>
        <option value="jp">日本語</option>
      </select>
    </div>
    <div class="tour-return-strip">
      <p id="tour-saved-summary" class="muted"></p>
      <div class="tour-return-actions">
        <button type="button" id="header-go-poi-btn" class="header-go-poi-btn" disabled>Aller au POI choisi</button>
        <button type="button" id="poi-propose-btn" class="poi-propose-btn">Proposer un POI</button>
        <button type="button" id="back-to-main-btn" class="back-main-btn">Retour au parcours</button>
      </div>
    </div>
  </header>

  <main>
    <div class="map-area">
      <div id="poi-map"></div>
      <section id="poi-detail-view" class="poi-detail-view" aria-hidden="true">
        <div class="poi-detail-toolbar">
          <button type="button" id="poi-detail-close" class="poi-detail-close">Fermer — carte</button>
        </div>
        <div class="poi-detail-columns">
          <div id="poi-detail-media" class="poi-detail-media">
            <div id="poi-first-photo"></div>
            <div id="poi-gallery" class="poi-detail-gallery-extra"></div>
          </div>
          <div id="poi-detail-scroll" class="poi-detail-scroll">
            <h2 id="poi-title"></h2>
            <p class="meta">
              <span id="poi-cat"></span> — <span id="poi-distance"></span>
            </p>
            <p id="poi-desc"></p>
            <div class="poi-cta-actions">
              <button id="go-btn" type="button">Voulez-vous y aller ?</button>
              <p id="maps-return-hint" class="maps-return-hint muted"></p>
            </div>
            <p id="poi-ask" class="muted"></p>
          </div>
        </div>
      </section>
    </div>

    <aside class="panel">
      <div id="visible-count">POI visibles: 0</div>
      <div id="poi-list"></div>
    </aside>
  </main>

  <div id="poi-propose-modal" class="poi-propose-modal" aria-hidden="true">
    <div class="poi-propose-backdrop"></div>
    <div class="poi-propose-dialog" role="dialog" aria-labelledby="poi-propose-title">
      <h2 id="poi-propose-title">Proposer un point d'intérêt</h2>
      <p id="poi-propose-hint" class="muted" style="font-size:0.85rem;margin:0 0 8px;"></p>
      <form id="poi-propose-form">
        <label id="poi-propose-name-label" for="poi-propose-name">Nom</label>
        <input id="poi-propose-name" name="name" required maxlength="120" autocomplete="off" />
        <label id="poi-propose-lat-label" for="poi-propose-lat">Latitude</label>
        <input id="poi-propose-lat" name="lat" type="number" step="any" required />
        <label id="poi-propose-lng-label" for="poi-propose-lng">Longitude</label>
        <input id="poi-propose-lng" name="lng" type="number" step="any" required />
        <div class="poi-propose-row">
          <button type="button" id="poi-propose-pick-map">Choisir sur la carte</button>
          <button type="button" id="poi-propose-my-pos">Ma position</button>
        </div>
        <p id="poi-propose-pick-hint" class="poi-propose-pick-hint"></p>
        <div id="poi-propose-mini-map" aria-label="Carte pour choisir le point"></div>
        <label id="poi-propose-desc-label" for="poi-propose-desc">Description</label>
        <textarea id="poi-propose-desc" name="description" required minlength="10" maxlength="500"></textarea>
        <label id="poi-propose-email-label" for="poi-propose-email">E-mail</label>
        <input id="poi-propose-email" name="email" type="email" maxlength="120" autocomplete="email" />
        <label id="poi-propose-photo-label" for="poi-propose-photo">Photo JPG</label>
        <input id="poi-propose-photo" name="photo" type="file" accept="image/jpeg,.jpg,.jpeg" required />
        <div id="poi-propose-error" style="display:none"></div>
        <div id="poi-propose-success" style="display:none"></div>
        <div class="poi-propose-actions">
          <button type="button" id="poi-propose-cancel">Annuler</button>
          <button type="submit" id="poi-propose-submit">Envoyer</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      try {
        if (window.languageSelector) {
          window.languageSelector.createSelector();
        }
      } catch (e) {
        console.error("[CLQ] poi-experiment language selector", e);
      }
    });
  </script>
  <script src="version.js"></script>
  <script src="js/clq-maps-launch.js?v=maps-same-tab"></script>
  <script src="js/poi-experiment.js?v=poi-images-dedupe"></script>
  <script src="js/poi-propose.js?v=poi-validate-fix"></script>
</body>
</html>
