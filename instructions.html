          } catch (e) {
            // Si la réponse n'est pas du JSON valide
            throw new Error('Invalid response from server');
          }

          if (response.ok && (data.ok || data.success)) {
            contactSuccess.textContent = data.message || texts.successMessage;
            contactSuccess.style.display = 'block';
            contactError.style.display = 'none';
            contactForm.reset();
            
            // Fermer le modal après 2 secondes
            setTimeout(() => {
              closeContactModal();
            }, 2000);
          } else {
            // Afficher le message d'erreur de l'API ou un message par défaut
            const errorMsg = data?.error || data?.message || (response.status === 400 ? 'Requête invalide. Vérifiez vos informations.' : texts.errorSend);
            contactError.textContent = errorMsg;
            contactError.style.display = 'block';
            contactSuccess.style.display = 'none';
          }
        } catch (error) {
          console.error('Erreur lors de l\'envoi du message:', error);
          contactError.textContent = texts.errorConnection;
          contactError.style.display = 'block';
          contactSuccess.style.display = 'none';
        } finally {
          isSubmitting = false;
          contactSubmit.disabled = false;
          contactSubmit.textContent = texts.submitButton;
        }
      });
    }

    // Initialiser la page quand le DOM est chargé
    document.addEventListener('DOMContentLoaded', initInstructionsPage);

    // Fonction pour afficher le popup des release notes (style similaire à parler montois)
    async function showReleaseNotesPopup() {
      if (document.getElementById('popup-release-notes')) return;

      const overlay = document.createElement('div');
      overlay.id = 'popup-release-notes';
      Object.assign(overlay.style, {
        position:'fixed', top:0, left:0, width:'100vw', height:'100vh',
        background:'rgba(0,0,0,0.7)', display:'flex', alignItems:'center',
        justifyContent:'center', zIndex:9999
      });

      const box = document.createElement('div');
      Object.assign(box.style, {
        background:'#fffbe6', border:'4px solid #b8860b', borderRadius:'18px',
        boxShadow:'0 0 24px #0008', padding:'32px 24px 24px', maxWidth:'90vw',
        width:'500px', maxHeight:'90vh', overflowY:'auto', textAlign:'left', position:'relative'
      });

      const title = document.createElement('h2');
      title.textContent = 'Release Notes';
      Object.assign(title.style, {
        marginTop:'0', marginBottom:'20px', color:'#4b2e05', 
        fontSize:'1.5em', fontWeight:'bold', textAlign:'center'
      });
      box.appendChild(title);

      const backBtn = document.createElement('button');
      backBtn.textContent = window.translationManager?.translate('back') || '⬅️ Retour';
      Object.assign(backBtn.style, {
        background:'#c8102e', color:'#fff', fontWeight:'bold', border:'none',
        borderRadius:'8px', padding:'10px 18px', fontSize:'1em', cursor:'pointer', marginBottom:'18px'
      });
      backBtn.onclick = () => document.body.removeChild(overlay);
      box.appendChild(backBtn);

      const content = document.createElement('div');
      content.id = 'release-notes-content';
      Object.assign(content.style, {
        color:'#4b2e05', lineHeight:'1.6', whiteSpace:'pre-wrap', 
        fontFamily:'Arial, sans-serif', fontSize:'0.95em'
      });
      content.textContent = 'Chargement...';
      box.appendChild(content);

      overlay.appendChild(box);
      document.body.appendChild(overlay);

      // Charger le contenu des release notes
      try {
        const response = await fetch('Release notes.txt');
        if (response.ok) {
          const text = await response.text();
          content.textContent = text;
        } else {
          content.textContent = 'Impossible de charger les release notes.';
        }
      } catch (error) {
        console.error('Erreur lors du chargement des release notes:', error);
        content.textContent = 'Erreur lors du chargement des release notes.';
      }

      // Fermer en cliquant sur l'overlay
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          document.body.removeChild(overlay);
        }
      });
    }
  </script>
</body>
