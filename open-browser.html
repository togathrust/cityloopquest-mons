<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ouverture…</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; text-align: center; background: #14365c; color: #fff; }
    .box { max-width: 400px; margin: 40px auto; background: #fff; color: #1a1a2e; border-radius: 12px; padding: 20px; }
    button { display: block; width: 100%; margin: 8px 0; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; }
    .chrome { background: #4285f4; color: #fff; }
    .safari { background: #007aff; color: #fff; }
    .copy { background: #b30000; color: #fff; }
    .hint { text-align: left; line-height: 1.45; font-size: 0.9rem; background: #eef4ff; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
  </style>
  <script src="js/clq-open-external.js"></script>
</head>
<body>
  <div class="box" id="panel" hidden>
    <h1 style="font-size:1.1rem;color:#b30000;">GPS : navigateur complet</h1>
    <p style="line-height:1.45;font-size:0.95rem;">Cette fenêtre ne permet pas le GPS.</p>
    <p class="hint" id="safari-hint" hidden><strong>Safari :</strong> icône <strong>Partager</strong> en bas → <strong>Ouvrir dans Safari</strong>, ou collez le lien copié dans Safari.</p>
    <button type="button" class="copy" id="btn-copy">Copier le lien de l’app</button>
    <button type="button" class="chrome" id="btn-chrome">Ouvrir dans Chrome</button>
    <button type="button" class="safari" id="btn-safari">Aide Safari</button>
  </div>
  <p id="wait">Ouverture…</p>
  <script>
    (function () {
      var target = location.origin + "/";
      var qs = location.search || "";
      if (qs) target += qs;

      function goApp() {
        location.replace(target);
      }

      if (window.clqIsRealMobileBrowser && window.clqIsRealMobileBrowser()) {
        goApp();
        return;
      }

      document.getElementById("wait").hidden = true;
      document.getElementById("panel").hidden = false;

      document.getElementById("btn-chrome").onclick = function () {
        if (window.clqOpenInChrome) window.clqOpenInChrome(target);
      };
      document.getElementById("btn-safari").onclick = function () {
        document.getElementById("safari-hint").hidden = false;
        if (window.clqOpenInSafariOrDefault) window.clqOpenInSafariOrDefault(target);
      };
      document.getElementById("btn-copy").onclick = function () {
        var done = function () { document.getElementById("btn-copy").textContent = "Lien copié !"; };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(target).then(done);
        } else {
          prompt("Copiez ce lien :", target);
          done();
        }
      };
    })();
  </script>
</body>
</html>
