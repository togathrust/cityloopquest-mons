<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sélection de langue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <!-- DÉSACTIVATION FORCÉE DU SERVICE WORKER - DOIT ÊTRE LE PREMIER -->
  <script>
    // DÉSACTIVER LE SERVICE WORKER IMMÉDIATEMENT
    (function() {
      'use strict';
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (let registration of registrations) {
              registration.unregister().then(function(success) {
                if (success) {
                  console.log('Service Worker désactivé');
                }
              });
            }
          });
          
          // Vider tous les caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              for (let name of names) {
                caches.delete(name);
              }
            });
          }
        }
      } catch (e) {
        console.error('Erreur désactivation SW:', e);
      }
    })();
  </script>
  
  <!-- Mise en page sélection de langue -->
  <style>
    :root {
      --shadow: 0 8px 24px rgba(0,0,0,0.3);
      --rad: 12px;
    }
    body {
      margin: 0; padding: 0;
      background: linear-gradient(135deg, #c8102e 0%, #b30000 100%);
      font-family: Arial, sans-serif;
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; overflow: hidden; max-width: 100vw; max-height: 100vh;
      box-sizing: border-box; padding-top: 15vh;
    }
    .language-container {
      display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(2, 1fr);
      gap: 30px; align-items: center; justify-items: center;
      max-width: calc(100vw - 40px); max-height: calc(100vh - 40px); box-sizing: border-box; padding: 20px;
    }
    .flag-button {
      width: 120px; height: 80px;
      border: 4px solid #fff; border-radius: var(--rad);
      cursor: pointer; transition: all 0.3s ease;
      background-size: cover; background-position: center;
      box-shadow: var(--shadow); position: relative; overflow: hidden;
      display: grid; place-items: center;
      background-color: #eee; /* fallback neutre */
    }
    .flag-button:hover { transform: scale(1.08); border-color: #ffd700; }

    /* Images internes ; on les affiche si chargées (sinon le background CSS reste) */
    .flag-button > img.flag-img {
      width: 100%; height: 100%; object-fit: cover; display: none; /* passe à block quand chargée */
    }
    /* Fallback texte si tout rate */
    .flag-button .fallback-label {
      position: absolute; inset: auto auto 6px 8px; font-weight: 700; font-size: 13px;
      color: #222; background: rgba(255,255,255,.8); padding: 2px 6px; border-radius: 8px; display: none;
    }
    .flag-button.is-fallback .fallback-label { display: inline-block; }

    /* Backgrounds CSS d’origine (restent actifs si rien d’autre ne marche) */
    .flag-fr { background-image: url('images/flag-fr.png'); }
    .flag-en { background-image: url('images/flag-en.png'); }
    .flag-nl { background-image: url('images/flag-nl.png'); }
    .flag-de { background-image: url('images/flag-de.png'); }
    .flag-it { background-image: url('images/flag-it.png'); }
    .flag-es { background-image: url('images/flag-es.png'); }
    .flag-pl { background-image: url('images/flag-pl.png'); }
    .flag-ar { background-image: url('images/flag-ar.png'); }
    .flag-cn { background-image: url('images/flag-cn.png'); }
    .flag-jp { background-image: url('images/flag-jp.png'); }

    @media (orientation: portrait) {
      .language-container { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(5, 1fr); gap: 22px; }
      .flag-button { width: 100px; height: 70px; }
    }
  </style>

  <!-- Bootstrap APP_CONFIG (sécurisé) -->
  <script>
    (function () {
      function safeGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
      var isLocal = (location.hostname==='localhost' || location.hostname==='127.0.0.1');
      var isDevPort = (location.port==='5173' || location.port==='5174');
      var dev = isLocal && isDevPort;
      var fromLS = safeGet('api_base');
      var guessed = dev
        ? location.origin.replace(/:517[34]/, ':8081')
        : location.origin;
      window.APP_CONFIG = window.APP_CONFIG || {};
      window.APP_CONFIG.API_BASE = fromLS || guessed;
    })();
  </script>
  <script src="api-base.js"></script>

  <!-- Traductions -->
  <script src="translations/translationManager.js"></script>
  <script src="translations/languageSelector.js"></script>
</head>
<body>
  <div class="language-container">
    <!-- Chaque bouton : images locales images/flag-{lang}.png -->
    <div class="flag-button flag-fr" data-lang="fr" data-src="images/flag-fr.png" title="Français">
      <img class="flag-img" src="images/flag-fr.png" alt="Français">
      <span class="fallback-label">FR</span>
    </div>
    <div class="flag-button flag-en" data-lang="en" data-src="images/flag-en.png" title="English">
      <img class="flag-img" src="images/flag-en.png" alt="English">
      <span class="fallback-label">EN</span>
    </div>
    <div class="flag-button flag-nl" data-lang="nl" data-src="images/flag-nl.png" title="Nederlands">
      <img class="flag-img" src="images/flag-nl.png" alt="Nederlands">
      <span class="fallback-label">NL</span>
    </div>
    <div class="flag-button flag-de" data-lang="de" data-src="images/flag-de.png" title="Deutsch">
      <img class="flag-img" src="images/flag-de.png" alt="Deutsch">
      <span class="fallback-label">DE</span>
    </div>
    <div class="flag-button flag-it" data-lang="it" data-src="images/flag-it.png" title="Italiano">
      <img class="flag-img" src="images/flag-it.png" alt="Italiano">
      <span class="fallback-label">IT</span>
    </div>
    <div class="flag-button flag-es" data-lang="es" data-src="images/flag-es.png" title="Español">
      <img class="flag-img" src="images/flag-es.png" alt="Español">
      <span class="fallback-label">ES</span>
    </div>
    <div class="flag-button flag-pl" data-lang="pl" data-src="images/flag-pl.png" title="Polski">
      <img class="flag-img" src="images/flag-pl.png" alt="Polski">
      <span class="fallback-label">PL</span>
    </div>
    <div class="flag-button flag-ar" data-lang="ar" data-src="images/flag-ar.png" title="العربية">
      <img class="flag-img" src="images/flag-ar.png" alt="العربية">
      <span class="fallback-label">AR</span>
    </div>
    <div class="flag-button flag-cn" data-lang="cn" data-src="images/flag-cn.png" title="中文">
      <img class="flag-img" src="images/flag-cn.png" alt="中文">
      <span class="fallback-label">CN</span>
    </div>
    <div class="flag-button flag-jp" data-lang="jp" data-src="images/flag-jp.png" title="日本語">
      <img class="flag-img" src="images/flag-jp.png" alt="日本語">
      <span class="fallback-label">JP</span>
    </div>
  </div>

  <script>
    // Forcer le chargement <img> (double filet : CSS bg + <img>)
    // Protection Android : try-catch pour éviter les blocages
    (function preloadFlags(){
      try {
        // Attendre que le DOM soit prêt
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', preloadFlags);
          return;
        }
        
        document.querySelectorAll('.flag-button').forEach(btn => {
          try {
            const url = btn.getAttribute('data-src');
            const img = btn.querySelector('img.flag-img');
            if (!url || !img) return;

            img.loading = 'lazy';
            img.decoding = 'async';
            img.src = url;

            img.addEventListener('load', () => {
              try {
                // si ça charge, on affiche l'<img> (par-dessus le background)
                img.style.display = 'block';
                btn.classList.remove('is-fallback');
              } catch (e) {}
            });

            img.addEventListener('error', () => {
              try {
                // fallback : fond neutre + sigle
                img.style.display = 'none';
                btn.classList.add('is-fallback');
              } catch (e) {}
            });
          } catch (e) {
            // Ignorer les erreurs pour ne pas bloquer l'affichage
          }
        });
      } catch (e) {
        // Ignorer les erreurs pour ne pas bloquer l'affichage
      }
    })();
  </script>

  <script>
    // Si l'utilisateur a déjà un code et une langue => route vers index.html
    // Protection Android : try-catch pour éviter les blocages
    function isFromClquestPortal() {
      try {
        if (new URLSearchParams(location.search).get('from') === 'clquest') return true;
      } catch (e) {}
      try {
        if (document.referrer && /clquest\.netlify\.app/i.test(document.referrer)) return true;
      } catch (e) {}
      return false;
    }

    (function() {
      try {
        const hasCode =
          localStorage.getItem('clq_short_code') ||
          localStorage.getItem('clq_token') ||
          localStorage.getItem('jwt') ||
          localStorage.getItem('clq_has_access') === '1';
        if (hasCode && !isFromClquestPortal()) {
          if (!localStorage.getItem('selectedLanguage')) {
            localStorage.setItem('selectedLanguage', 'fr');
            localStorage.setItem('lang', 'fr');
            sessionStorage.setItem('webLanguageSelected', 'true');
          }
          location.replace('index.html');
        }
      } catch (e) {
        // Ignorer les erreurs pour ne pas bloquer l'affichage
      }
    })();

    // Choix de langue → redirection directe vers choose-access
    // Protection Android : try-catch pour éviter les blocages
    document.addEventListener('DOMContentLoaded', function () {
      try {
        const langButtons = document.querySelectorAll('.flag-button');
        if (!langButtons.length) return;

        langButtons.forEach(btn => {
          btn.addEventListener('click', async function (e) {
            try {
              e.preventDefault();
              const lang = btn.getAttribute('data-lang') || 'fr';
              try {
                localStorage.setItem('selectedLanguage', lang);
                localStorage.setItem('lang', lang);
                sessionStorage.setItem('webLanguageSelected', 'true');
              } catch (_) {}

              try {
                if (window.translationManager) {
                  if (typeof window.translationManager.loadTranslations === 'function') {
                    await window.translationManager.loadTranslations();
                  } else if (typeof window.translationManager.init === 'function') {
                    await window.translationManager.init();
                  }
                  window.translationManager.setLanguage(lang);
                  window.translationManager.applyTranslations();
                }
              } catch (err) {
                console.warn('[language-selection] init traductions :', err);
              }

              const chooseUrl = isFromClquestPortal()
                ? 'choose-access.html?from=clquest'
                : 'choose-access.html';
              location.replace(chooseUrl);
            } catch (e) {
              // Ignorer les erreurs pour ne pas bloquer l'affichage
            }
          });
        });
      } catch (e) {
        // Ignorer les erreurs pour ne pas bloquer l'affichage de la page
      }
    });
  </script>
</body>
</html>
