# CityLoop Quest Mons - Netlify

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# POI communautaires : Netlify > Storage > Blobs
# Variables : SMTP_*, POI_STAFF_EMAIL, POI_APPROVE_SECRET, SITE_URL,
# NETLIFY_SITE_ID + NETLIFY_AUTH_TOKEN (ou NETLIFY_BLOB_READ_WRITE_TOKEN)

[functions."poi-propose"]
  timeout = 26

# Redirection SPA si besoin (toutes les routes -> index.html)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
