<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta content="width=device-width,initial-scale=1" name="viewport"><title>Jacques du Broeucq</title><link href="style.css" rel="stylesheet"><script src="translations/translationManager.js"></script><script src="translations/languageSelector.js"></script><script src="js/access-guard.js" defer="defer"></script><style>body{font-family:sans-serif;padding:20px;line-height:1.6}h1{text-align:center}.content{max-width:720px;margin:auto;white-space:pre-wrap}#return-btn{display:block;margin:40px auto;padding:10px 20px;font-size:1rem}.language-selector{position:fixed;top:20px;right:20px;z-index:1000;background:#fff;border:2px solid #b8860b;border-radius:10px;padding:10px;box-shadow:0 4px 8px rgba(0,0,0,.2)}.language-selector select{padding:5px;border:1px solid #ccc;border-radius:5px;font-size:14px}.back-button{position:fixed;top:50%;right:10px;transform:translateY(-50%);z-index:1000;padding:10px 14px;background-color:#c8102e;color:#fff;font-size:16px;border:none;border-radius:8px 0 0 8px;cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,.2)}</style></head><body><header class="main-header"><div class="header-content"><img src="images/icone titre0.png" alt="Icone 0" class="header-img left"><h1 id="mainTitle">CityLoop Quest Mons - La Chevauchée de Saint Georges</h1><img src="images/icone titre1.png" alt="Icone 1" class="header-img right"></div></header><div class="content"><h1 id="pageTitle">Jacques du Broeucq</h1><h2 id="subtitle">Le Maître artiste de l'empereur Charles Quint</h2><br><br><img src="images/dubroeucq.jpg" alt="Jacques du Broeucq" class="portrait"><br><br><h1 id="source">(texte tiré du site Mons.be)</h1><div id="content-container"></div></div><button class="back-button" id="back-button">BACK</button><script>// Charger les traductions
let translations = {};

async function loadTranslations() {
    try {
        const response = await fetch('translations/translations_jacques_du_broeucq.json');
        translations = await response.json();
        applyTranslations();
    } catch (error) {
        console.error('Erreur lors du chargement des traductions:', error);
    }
}

function changeLanguage(lang) {
    localStorage.setItem('selectedLanguage', lang);
    applyTranslations();
}

// Initialiser le sélecteur de langue personnalisé
function initLanguageSelector() {
    // Supprimer l'ancien sélecteur s'il existe encore
    const oldSelector = document.querySelector('.language-selector');
    if (oldSelector) {
        oldSelector.remove();
    }
    
    if (window.languageSelector) {
        window.languageSelector.createSelector();
        window.languageSelector.updateSelectorValue();
    }
}

function applyTranslations() {
    const lang = localStorage.getItem('selectedLanguage') || 'fr';
    const t = translations[lang] || translations.fr;
    
    // Mettre à jour le sélecteur de langue personnalisé
    if (window.languageSelector) {
        window.languageSelector.updateSelectorValue();
    }
    
    // Titre principal de l'en-tête
    document.getElementById('mainTitle').textContent = t.mainTitle;
    
    // Titre de la page
    document.getElementById('pageTitle').textContent = t.pageTitle;
    
    // Sous-titre
    document.getElementById('subtitle').textContent = t.subtitle;
    
    // Source
    document.getElementById('source').textContent = t.source;
    
    // Bouton retour
    document.getElementById('back-button').textContent = t.backButton;
    
    // Générer le contenu dynamiquement
    generateContent(lang);
}

function generateContent(lang) {
    const container = document.getElementById('content-container');
    const t = translations[lang] || translations.fr;
    
    if (!t.content) {
        console.error('Contenu non trouvé pour la langue:', lang);
        return;
    }
    
    let html = '';
    
    // Biographie
    html += `<p>${t.content.biography}</p>`;
    
    // Œuvres célèbres
    html += `<h2>${t.content.famousWorks.title}</h2>`;
    html += `<p>${t.content.famousWorks.works}</p>`;
    
    // Contexte historique
    html += `<h2>${t.content.historicalContext.title}</h2>`;
    html += `<p>${t.content.historicalContext.content}</p>`;
    
    // Moments forts
    html += `<h2>${t.content.keyMoments.title}</h2>`;
    html += `<p>${t.content.keyMoments.content}</p>`;
    
    // Italie
    html += `<h2>${t.content.italy.title}</h2>`;
    html += `<p>${t.content.italy.content}</p>`;
    
    // Parcours artistique
    html += `<h2>${t.content.artisticPath.title}</h2>`;
    html += `<p>${t.content.artisticPath.content}</p>`;
    
    // Sculpteur
    html += `<h2>${t.content.sculptor.title}</h2>`;
    html += `<p>${t.content.sculptor.content}</p>`;
    
    // Projet du jubé
    html += `<h2>${t.content.jubeProject.title}</h2>`;
    html += `<p>${t.content.jubeProject.content}</p>`;
    
    // Résurrection
    html += `<h2>${t.content.resurrection.title}</h2>`;
    html += `<p>${t.content.resurrection.content}</p>`;
    
    // Saint-Barthélémy
    html += `<h2>${t.content.saintBartholomew.title}</h2>`;
    html += `<p>${t.content.saintBartholomew.content}</p>`;
    
    // Particularité de son œuvre
    html += `<h2>${t.content.workCharacteristics.title}</h2>`;
    html += `<p>${t.content.workCharacteristics.content}</p>`;
    
    // Albâtre
    html += `<h2>${t.content.alabaster.title}</h2>`;
    html += `<p>${t.content.alabaster.content}</p>`;
    
    // Architecte
    html += `<h2>${t.content.architect.title}</h2>`;
    html += `<p>${t.content.architect.content}</p>`;
    
    // Châteaux de Binche et Mariemont
    html += `<h2>${t.content.bincheMariemont.title}</h2>`;
    html += `<p>${t.content.bincheMariemont.content}</p>`;
    
    // Personnage
    html += `<h2>${t.content.character.title}</h2>`;
    html += `<p>${t.content.character.content}</p>`;
    
    // Oublié
    html += `<h2>${t.content.forgotten.title}</h2>`;
    html += `<p>${t.content.forgotten.content}</p>`;
    
    container.innerHTML = html;
}

// Initialiser les traductions au chargement de la page
document.addEventListener('DOMContentLoaded', function() {
    // Forcer la mise à jour du cache en ajoutant un timestamp
    
    loadTranslations();
    initLanguageSelector();
    
    // Vérifier que le nouveau sélecteur est bien présent
    setTimeout(() => {
        const newSelector = document.getElementById('language-selector');
        if (newSelector) {
        } else {
        }
    }, 1000);
});

// Écouter les changements de langue
document.addEventListener('languageChanged', function(event) {
    applyTranslations();
});

document.addEventListener("DOMContentLoaded", () => {
  const backButton = document.getElementById("back-button");
  if (backButton) {
    backButton.addEventListener("click", () => {
      window.location.href = "artistes_celebres.html";
    });
  }
});</script></body></html>
