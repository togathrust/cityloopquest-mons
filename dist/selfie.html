<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title data-translate="selfie_title">Selfie Saint Georges</title><link rel="stylesheet" href="style.css"><script src="translations/translationManager.js"></script><script src="translations/languageSelector.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script><script src="js/access-guard.js" defer="defer"></script><style>body{display:flex;flex-direction:column;height:100vh;overflow:hidden;margin:0;padding:0}header.main-header{flex-shrink:0}.selfie-container{flex-grow:1;position:relative;display:flex;align-items:center;justify-content:center}.stgeorges-bg{position:absolute;width:100%;height:100%;object-fit:contain;z-index:15;pointer-events:none}#video-wrapper{position:absolute;width:400px;height:400px;transform:translate(-15%,-2%);border-radius:50%;overflow:hidden;z-index:5;border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center}.selfie-btns{position:absolute;right:5%;top:50%;transform:translateY(-50%);z-index:30;display:flex;flex-direction:column;gap:15px}.selfie-btns button{font-size:1.1rem;padding:12px 22px;border-radius:8px;border:none;background:#c8102e;color:#fff;cursor:pointer;font-family:MedievalSharp,Arial,serif;box-shadow:0 2px 8px #0004}.selfie-btns button:disabled{background:#aaa;color:#eee;cursor:not-allowed}.selfie-text-overlay{position:absolute;width:100%;height:100%;pointer-events:none;z-index:20;display:flex;flex-direction:column;justify-content:space-between;padding:20px;box-sizing:border-box}.selfie-text-top{text-align:center;color:#b30000;font-family:MedievalSharp,Arial,serif;font-size:1.8rem;font-weight:700;text-shadow:2px 2px 4px rgba(0,0,0,.8);background:rgba(255,255,255,.9);padding:10px 15px;border-radius:10px;border:3px solid #b8860b;box-shadow:0 4px 8px rgba(0,0,0,.3);margin-top:-5%}.selfie-text-bottom{text-align:center;color:#4b2e05;font-family:MedievalSharp,Arial,serif;font-size:1.2rem;font-weight:700;text-shadow:1px 1px 2px rgba(255,255,255,.8);background:rgba(255,255,255,.9);padding:8px 12px;border-radius:8px;border:2px solid #b8860b;box-shadow:0 2px 4px rgba(0,0,0,.3)}.countdown-overlay{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;font-family:MedievalSharp,Arial,serif;font-size:6rem;font-weight:700;color:#b30000;text-shadow:3px 3px 6px rgba(0,0,0,.8);background:rgba(255,255,255,.9);padding:20px 40px;border-radius:20px;border:4px solid #b30000;display:none}.popup-message{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;background:rgba(0,0,0,.9);color:#fff;padding:20px 30px;border-radius:15px;font-family:MedievalSharp,Arial,serif;font-size:1.2rem;font-weight:700;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.5);border:3px solid #b30000;animation:popupFade 3s ease-in-out}@keyframes popupFade{0%{opacity:0;transform:translate(-50%,-50%) scale(.8)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.8)}}</style></head><body><header class="main-header"><div class="header-content"><img src="images/icone titre0.png" alt="Icone 0" class="header-img left"><h1 data-translate="title_chevauchee">CityLoop Quest Mons - La Chevauchée de Saint Georges</h1><img src="images/icone titre1.png" alt="Icone 1" class="header-img right"></div></header><div class="selfie-container"><div id="video-wrapper"><video id="video" autoplay playsinline muted style="display:block;border-radius:50%"></video></div><img src="images/fond_saintgeorges_dragon.png" class="stgeorges-bg" alt="Fond Saint Georges et Dragon"><div class="selfie-text-overlay"><div class="selfie-text-top" data-translate="selfie_victory_text">J'ai vaincu le Dragon de Mons !</div><div class="selfie-text-bottom" id="selfie-text-bottom">Parcours de CityLoopQuest Mons</div></div><div class="selfie-btns" id="selfie-btns"><button id="backBtn" data-translate="back_button" style="position:fixed;right:-8px;top:50%;transform:translateY(-50%);z-index:40;font-size:1rem;padding:8px 4px;border-radius:12px;background:#c8102e;color:#fff;border:none;box-shadow:0 2px 6px #0003;opacity:.8;writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:.15em;line-height:1.1;min-width:24px;min-height:80px">R E T O U R</button></div></div><script>// Script simplifié pour la caméra selfie
let video = document.getElementById('video');
let stream = null;

function startCamera() {
    const constraints = {
        video: {
            facingMode: 'user', // Caméra frontale
            width: { ideal: 1280, min: 640 },
            height: { ideal: 720, min: 480 }
        },
        audio: false
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(mediaStream) {
            stream = mediaStream;
            video.srcObject = mediaStream;
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            video.style.display = 'block';
            
            
            // S'assurer que la vidéo se charge
            video.onloadedmetadata = function() {
                video.play().catch(function(err) {
                });
                
                // Calculer et appliquer le dézoom maximal tout en gardant l'image centrée
                applyMaxZoomOut();
                
                // Afficher le popup après que la caméra soit acceptée et la vidéo chargée
                setTimeout(showCapturePopup, 1000);
            };
            
            video.onerror = function(err) {
            };
        })
        .catch(function(err) {
            // Essayer avec des contraintes plus simples
            const simpleConstraints = {
                video: true,
                audio: false
            };
            
            navigator.mediaDevices.getUserMedia(simpleConstraints)
                .then(function(mediaStream) {
                    stream = mediaStream;
                    video.srcObject = mediaStream;
                    video.autoplay = true;
                    video.playsInline = true;
                    video.muted = true;
                    video.style.display = 'block';
                    
                    // Calculer et appliquer le dézoom maximal tout en gardant l'image centrée
                    if (video.readyState >= 1) {
                        applyMaxZoomOut();
                    } else {
                        video.onloadedmetadata = function() {
                            applyMaxZoomOut();
                        };
                    }
                    
                    // Afficher le popup même avec les contraintes simples
                    setTimeout(showCapturePopup, 1000);
                })
                .catch(function(err2) {
                });
        });
}

function showCapturePopup() {
    // Créer le popup
    const popup = document.createElement('div');
    popup.className = 'popup-message';
    popup.innerHTML = '<span data-translate="capture_popup_message">A vous de prendre la capture d\'écran !! Attendre la disparition de ce popup...</span>';
    document.body.appendChild(popup);
    
    // Appliquer les traductions au popup
    if (window.translationManager && typeof window.translationManager.applyTranslations === 'function') {
        window.translationManager.applyTranslations();
    }
    
    // Supprimer le popup après 5 secondes
    setTimeout(() => {
        if (popup.parentNode) {
            document.body.removeChild(popup);
        }
    }, 5000);
}

function applyMaxZoomOut() {
    // Cette fonction optimise le dézoom pour avoir le maximum d'image visible
    // tout en restant dans le cercle, sans que l'image sorte ou remplisse complètement le cercle
    
    const videoWrapper = document.getElementById('video-wrapper');
    const video = document.getElementById('video');
    if (!videoWrapper || !video) return;
    
    // Attendre que les dimensions de la vidéo soient disponibles
    if (video.videoWidth === 0 || video.videoHeight === 0) {
        // Réessayer après un court délai
        setTimeout(applyMaxZoomOut, 100);
        return;
    }
    
    // Dimensions du conteneur circulaire (400x400px)
    const containerSize = 400;
    const safetyMargin = 0.98; // 98% pour éviter que l'image sorte du cercle
    const maxSize = containerSize * safetyMargin;
    
    // Dimensions réelles de la vidéo
    const videoWidth = video.videoWidth;
    const videoHeight = video.videoHeight;
    const videoAspect = videoWidth / videoHeight;
    
    // Calculer le facteur d'échelle pour maximiser l'image visible
    // tout en restant dans le cercle
    let scale;
    if (videoAspect >= 1) {
        // La vidéo est plus large que haute (landscape ou carré)
        // Le facteur limitant est la hauteur du conteneur
        scale = maxSize / videoHeight;
    } else {
        // La vidéo est plus haute que large (portrait)
        // Le facteur limitant est la largeur du conteneur
        scale = maxSize / videoWidth;
    }
    
    // Calculer les dimensions finales
    const finalWidth = videoWidth * scale;
    const finalHeight = videoHeight * scale;
    
    // Appliquer les styles pour centrer et redimensionner la vidéo
    video.style.width = finalWidth + 'px';
    video.style.height = finalHeight + 'px';
    video.style.objectFit = 'fill'; // Utiliser fill car on contrôle déjà les dimensions
    video.style.position = 'absolute';
    video.style.left = '50%';
    video.style.top = '50%';
    video.style.transform = 'translate(-50%, -50%)'; // Centrage parfait
    video.style.borderRadius = '50%';
}

function updateCircuitText() {
    const selectedCircuit = localStorage.getItem('selectedCircuit');
    const selfieTextBottom = document.getElementById('selfie-text-bottom');
    
    if (selectedCircuit) {
        let translationKey = '';
        switch(selectedCircuit) {
            case 'petit':
                translationKey = 'circuit_short';
                break;
            case 'moyen':
                translationKey = 'circuit_medium';
                break;
            case 'grand':
                translationKey = 'circuit_long';
                break;
            default:
                translationKey = 'circuit_default';
        }
        
        // Appliquer la traduction
        const selectedLanguage = localStorage.getItem('selectedLanguage') || 'en';
        if (window.translationManager && window.translationManager.translations) {
            const translations = window.translationManager.translations[selectedLanguage];
            if (translations && translations[translationKey]) {
                selfieTextBottom.textContent = translations[translationKey];
            } else {
                // Fallback avec la traduction en anglais
                const enTranslations = window.translationManager.translations['en'];
                if (enTranslations && enTranslations[translationKey]) {
                    selfieTextBottom.textContent = enTranslations[translationKey];
                } else {
                    // Fallback final
                    selfieTextBottom.textContent = 'Tour of CityLoop Quest Mons';
                }
            }
        } else {
            // Si le gestionnaire de traduction n'est pas encore chargé
            selfieTextBottom.textContent = 'Tour of CityLoop Quest Mons';
        }
    }
}

function goBack() {
    window.history.back();
}

// Initialiser au chargement
document.addEventListener('DOMContentLoaded', function() {
    // Démarrer la caméra
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        startCamera();
    }
    
    // Créer le sélecteur de langue
    if (window.languageSelector) {
        window.languageSelector.createSelector();
    }
    
    // Appliquer les traductions
    if (window.translationManager) {
        window.translationManager.init().then(() => {
            // Mettre à jour le texte du circuit après que les traductions soient chargées
            updateCircuitText();
        });
    } else {
        // Mettre à jour le texte du circuit même si le gestionnaire n'est pas disponible
        updateCircuitText();
    }
    
    // Événement du bouton retour
    document.getElementById('backBtn').addEventListener('click', goBack);
    
    // Écouter les changements de langue
    document.addEventListener('languageChanged', function(event) {
        updateCircuitText();
    });
});</script></body></html>
