<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Associations</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet"><script src="translations/translationManager.js"></script><script src="translations/languageSelector.js"></script><script src="js/access-guard.js" defer="defer"></script><style>body{background:url('images/parchemin.jpg') no-repeat center center fixed;background-size:cover;font-family:'EB Garamond',Georgia,serif;margin:0;padding:20px;min-height:100vh;color:#3a2a0a}.back-button{position:fixed;top:50%;right:10px;transform:translateY(-50%);z-index:1000;padding:10px 14px;background:linear-gradient(135deg,#c8102e,#a00d24);color:#fff;font-size:16px;border:none;border-radius:8px 0 0 8px;cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,.3);transition:all .3s ease}.back-button:hover{background:linear-gradient(135deg,#a00d24,#800a1c);transform:translateY(-50%) scale(1.05)}.content-container{max-width:900px;margin:80px auto 30px auto;padding:0 20px}.parchemin-content{font-family:'EB Garamond',Georgia,serif;color:#3a2a0a;font-size:1.15em;line-height:1.6;width:80%;margin:0 auto}.parchemin-content h1{font-family:MedievalSharp,'Cinzel Decorative',serif;color:#7c4a02;font-size:2.2em;margin-top:0;margin-bottom:30px;letter-spacing:1px;text-shadow:1px 1px 0 #fffbe6;text-align:center}.parchemin-content h2{font-family:MedievalSharp,'Cinzel Decorative',serif;color:#7c4a02;font-size:1.6em;margin-top:30px;margin-bottom:15px;letter-spacing:.5px;text-shadow:1px 1px 0 #fffbe6}.parchemin-content h3{font-family:MedievalSharp,'Cinzel Decorative',serif;color:#7c4a02;font-size:1.3em;margin-top:20px;margin-bottom:10px;letter-spacing:.3px;text-shadow:1px 1px 0 #fffbe6}.parchemin-content p{margin-bottom:15px;text-align:justify}.parchemin-content img{display:block;margin:20px auto;max-width:100%;height:auto;border-radius:8px;box-shadow:0 4px 8px rgba(0,0,0,.2);border:2px solid #b8860b}.parchemin-content h2+img{width:600px;height:400px;object-fit:cover}.nav-btns{display:flex;justify-content:center;gap:20px;margin:20px 0 30px 0}.nav-btns button{padding:12px 24px;font-size:1.1em;border-radius:8px;border:2px solid #b8860b;background:linear-gradient(135deg,#d4af37,#b8860b);color:#3a2a0a;cursor:pointer;font-weight:700;transition:all .3s ease;box-shadow:0 4px 8px rgba(184,134,11,.3)}.nav-btns button:hover{background:linear-gradient(135deg,#b8860b,#8b6914);transform:translateY(-2px);box-shadow:0 6px 12px rgba(184,134,11,.4)}@media (max-width:768px){.parchemin-content{width:95%;font-size:1em}.parchemin-content h1{font-size:1.8em}.parchemin-content h2{font-size:1.4em}.parchemin-content img{width:100%;max-width:280px;height:auto}.parchemin-content h2+img{width:500px;height:340px}}</style></head><body><header class="main-header"><div class="header-content"><img src="images/icone titre0.png" alt="Icone 0" class="header-img left"><h1>CityLoop Quest Mons - La Chevauchée de Saint Georges</h1><img src="images/icone titre1.png" alt="Icone 1" class="header-img right"></div></header><div class="content-container"><div class="nav-btns"><button onclick="window.location.href='personnages.html'" id="btn-personnages">PERSONNAGES</button> <button onclick="window.location.href='procession.html'" id="btn-procession">PROCESSION</button></div><div class="parchemin-content" id="content"></div></div><button class="back-button" id="back-button">BACK</button><script>let currentLanguage = 'fr';
    let translations = {};

    // Initialiser le sélecteur de langue personnalisé
    function initLanguageSelector() {
      // Supprimer l'ancien sélecteur s'il existe encore
      const oldSelector = document.querySelector('.language-selector');
      if (oldSelector) {
        oldSelector.remove();
      }
      
      if (window.languageSelector) {
        window.languageSelector.createSelector();
        window.languageSelector.updateSelectorValue();
      }
    }

    // Charger les traductions
    async function loadTranslations() {
      try {
        const response = await fetch('translations/translations_associations.json');
        translations = await response.json();
        
        // Restaurer la langue précédemment sélectionnée
        const savedLanguage = localStorage.getItem('selectedLanguage') || 'fr';
        currentLanguage = savedLanguage;
        
        // Mettre à jour le sélecteur de langue personnalisé
        if (window.languageSelector) {
          window.languageSelector.updateSelectorValue();
        }
        
        updateContent();
      } catch (error) {
        console.error('Erreur lors du chargement des traductions:', error);
      }
    }

    // Mettre à jour le contenu selon la langue
    function updateContent() {
      const contentDiv = document.getElementById('content');
      const langData = translations[currentLanguage];
      
      if (langData) {
        contentDiv.innerHTML = `
          <h1>${langData.title}</h1>
          <div>${langData.content}</div>
        `;
        
        // Mettre à jour le titre de l'en-tête
        const headerTitle = document.querySelector('.header-content h1');
        if (headerTitle) {
          headerTitle.textContent = langData.headerTitle || 'La Chevauchée de Saint Georges';
        }
        
        // Mettre à jour les boutons de navigation
        if (langData.navButtons) {
          const btnPersonnages = document.getElementById('btn-personnages');
          const btnProcession = document.getElementById('btn-procession');
          
          if (btnPersonnages) {
            btnPersonnages.textContent = langData.navButtons.personnages || 'PERSONNAGES';
          }
          if (btnProcession) {
            btnProcession.textContent = langData.navButtons.procession || 'PROCESSION';
          }
        }
        
        // Mettre à jour le bouton retour
        const backButton = document.getElementById('back-button');
        if (backButton && langData.continue) {
          backButton.textContent = langData.continue;
        }
      } else {
        console.error('Aucune donnée de langue trouvée pour:', currentLanguage);
      }
    }

    // Gestionnaire du bouton retour
    document.getElementById('back-button').addEventListener('click', function() {
      window.location.href = 'folklore.html';
    });

    // Écouter les changements de langue
    document.addEventListener('languageChanged', function(event) {
      currentLanguage = event.detail.language;
      updateContent();
    });

    // Charger les traductions au chargement de la page
    document.addEventListener('DOMContentLoaded', function() {
      loadTranslations();
      initLanguageSelector();
      setTimeout(() => {
        const newSelector = document.getElementById('language-selector');
        if (newSelector) {
        } else {
        }
      }, 1000);
    });</script></body></html>
