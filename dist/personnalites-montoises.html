<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"><meta content="width=device-width,initial-scale=1" name="viewport"><title>Personnalités Montoises</title><link href="style.css" rel="stylesheet"><script src="js/access-control.js"></script><script src="translations/translationManager.js"></script><script src="translations/languageSelector.js"></script><script src="js/access-guard.js" defer="defer"></script><style>body{font-family:sans-serif;padding:20px;line-height:1.6}h1{text-align:center}.content{max-width:720px;margin:auto;white-space:pre-wrap}#return-btn{display:block;margin:40px auto;padding:10px 20px;font-size:1rem}#personnalites-container{max-width:720px;margin:auto}</style></head><body><header class="main-header"><div class="header-content"><img src="images/icone titre0.png" alt="Icone 0" class="header-img left"><h1 id="mainTitle">CityLoop Quest Mons - La Chevauchée de Saint Georges</h1><img src="images/icone titre1.png" alt="Icone 1" class="header-img right"></div></header><h1 id="pageTitle">👤 Personnalités Montoises</h1><div id="personnalites-container"></div><button class="back-button" id="back-button">BACK</button><script>// Charger les traductions
let translations = {};

async function loadTranslations() {
    try {
        const response = await fetch('translations/translations_personnalites_montoises.json');
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        translations = await response.json();
        
        applyTranslations();
    } catch (error) {
        console.error('❌ Erreur lors du chargement des traductions:', error);
    }
}

function changeLanguage(lang) {
    localStorage.setItem('selectedLanguage', lang);
    applyTranslations();
}

// Initialiser le sélecteur de langue personnalisé
function initLanguageSelector() {
    // Supprimer l'ancien sélecteur s'il existe encore
    const oldSelector = document.querySelector('.language-selector');
    if (oldSelector) {
        oldSelector.remove();
    }
    
    if (window.languageSelector) {
        window.languageSelector.createSelector();
        window.languageSelector.updateSelectorValue();
    }
}

function applyTranslations() {
    const currentLang = localStorage.getItem('selectedLanguage') || 'fr';
    
    if (!translations || !translations[currentLang]) {
        console.error('❌ Traductions non disponibles pour la langue:', currentLang);
        return;
    }
    
    const langData = translations[currentLang];
    
    // Mettre à jour le sélecteur de langue personnalisé
    if (window.languageSelector) {
        window.languageSelector.updateSelectorValue();
    }
    
    // Titre principal de l'en-tête
    if (document.getElementById('mainTitle')) {
        document.getElementById('mainTitle').textContent = langData.mainTitle;
    }
    
    // Titre de la page
    if (document.getElementById('pageTitle')) {
        document.getElementById('pageTitle').textContent = langData.pageTitle;
    }
    
    // Bouton retour
    if (document.getElementById('back-button')) {
        document.getElementById('back-button').textContent = langData.backButton;
    }
    
    // Générer le contenu des personnalités
    generatePersonnalitesContent(currentLang);
}

function generatePersonnalitesContent(lang) {
    const container = document.getElementById('personnalites-container');
    const langData = translations[lang] || translations.fr;
    
    if (!langData.personnalites) {
        console.error('❌ Données des personnalités non trouvées pour la langue:', lang);
        return;
    }
    
    
    let html = '';
    
    // Parcourir toutes les personnalités dans l'ordre
    Object.keys(langData.personnalites).forEach(key => {
        const personnalite = langData.personnalites[key];
        html += `
            <div class="personnage">
                <h2>${personnalite.name}</h2>
                <p>${personnalite.bio}</p>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// Initialiser les traductions au chargement de la page
document.addEventListener('DOMContentLoaded', function() {
    // Vérifier l'accès à la page
    if (!window.checkPageAccess('personnalites-montoises.html')) {
        return;
    }
    
    // Forcer la mise à jour du cache en ajoutant un timestamp
    
    loadTranslations();
    initLanguageSelector();
    
    // Vérifier que le nouveau sélecteur est bien présent
    setTimeout(() => {
        const newSelector = document.getElementById('language-selector');
        if (newSelector) {
        } else {
        }
    }, 1000);
});

// Écouter les changements de langue
document.addEventListener('languageChanged', function(event) {
    applyTranslations();
});

document.addEventListener("DOMContentLoaded", () => {
  const backButton = document.getElementById("back-button");
  if (backButton) {
    backButton.addEventListener("click", () => {
      window.location.href = "personnalites.html";
    });
  }
});</script></body></html>
