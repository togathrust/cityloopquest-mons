<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CityLoop Quest Mons - La Chevauchée de Saint Georges</title><link rel="stylesheet" href="style.css"><script src="translations/translationManager.js"></script><script src="translations/languageSelector.js"></script><script>window.REQUIRES_FULL = true;</script><script src="api-base.js"></script><script src="js/access-control.js"></script><script src="js/access-guard.js" defer="defer"></script><style>body{font-family:Arial,sans-serif;margin:0;padding:20px}.back-button{position:fixed;top:50%;right:10px;transform:translateY(-50%);z-index:1000;padding:10px 14px;background-color:#c8102e;color:#fff;font-size:16px;border:none;border-radius:8px 0 0 8px;cursor:pointer;box-shadow:0 0 6px rgba(0,0,0,.2)}.content-container{max-width:900px;margin:80px auto 30px auto;padding:0 20px}.parchemin-content{font-family:'EB Garamond',Georgia,serif;color:#3a2a0a;font-size:1.15em;line-height:1.6;width:80%;margin:0 auto;text-align:center}.parchemin-content h1{font-family:MedievalSharp,'Cinzel Decorative',serif;color:#7c4a02;font-size:2.2em;margin-top:0;margin-bottom:30px;letter-spacing:1px;text-shadow:1px 1px 0 #fffbe6;text-align:center}.button-container{max-width:600px;margin:auto;display:flex;flex-direction:column;gap:15px}.button-container a{text-decoration:none;background-color:#007bff;color:#fff;padding:12px 20px;border-radius:5px;transition:background-color .3s;font-family:'EB Garamond',Georgia,serif;font-size:1.1em}.button-container a:hover{background-color:#0056b3}@media (max-width:768px){.parchemin-content{width:95%;font-size:1em}.parchemin-content h1{font-size:1.8em}.button-container a{font-size:1em;padding:10px 15px}}</style></head><body><header class="main-header"><div class="header-content"><img src="images/icone titre0.png" alt="Icone 0" class="header-img left"><h1 id="mainTitle">CityLoop Quest Mons - La Chevauchée de Saint Georges</h1><img src="images/icone titre1.png" alt="Icone 1" class="header-img right"></div></header><div class="content-container"><div class="parchemin-content" id="content"></div></div><button class="back-button" id="back-button"></button><script>let currentLanguage = 'fr';
    let translations = {};

    // Initialiser le sélecteur de langue personnalisé
    function initLanguageSelector() {
      // Supprimer l'ancien sélecteur s'il existe encore
      const oldSelector = document.querySelector('.language-selector');
      if (oldSelector) {
        oldSelector.remove();
      }
      
      if (window.languageSelector) {
        window.languageSelector.createSelector();
        window.languageSelector.updateSelectorValue();
      }
    }

    // Charger les traductions
    async function loadTranslations() {
      try {
        const response = await fetch('translations/translations_folklore.json');
        translations = await response.json();
        
        // Restaurer la langue précédemment sélectionnée
        const savedLanguage = localStorage.getItem('selectedLanguage') || 'fr';
        currentLanguage = savedLanguage;
        
        // Mettre à jour le sélecteur de langue personnalisé
        if (window.languageSelector) {
          window.languageSelector.updateSelectorValue();
        }
        
        updateContent();
      } catch (error) {
        console.error('Erreur lors du chargement des traductions:', error);
      }
    }

    // Mettre à jour le contenu selon la langue
    function updateContent() {
      const contentDiv = document.getElementById('content');
      const langData = translations[currentLanguage];
      
      if (langData) {
        contentDiv.innerHTML = `
          <h1>${langData.title}</h1>
          ${langData.content}
        `;
        
        // Mettre à jour le titre de l'en-tête
        const headerTitle = document.querySelector('.header-content h1');
        if (headerTitle) {
          headerTitle.textContent = langData.headerTitle || 'CityLoop Quest Mons - La Chevauchée de Saint Georges';
        }
        
        // Mettre à jour le bouton retour
        const backButton = document.getElementById('back-button');
       if (backButton && langData.backButton) {
          backButton.textContent = langData.backButton;
        } else {
        }
      }
    }

    // Gestionnaire du bouton retour
    document.getElementById('back-button').addEventListener('click', function() {
      const savedIndex = localStorage.getItem("mons_currentIndex") || "0";
      const savedScore = localStorage.getItem("mons_score") || "0";
      const quizState = localStorage.getItem("mons_quizEnabled") || "false";

      localStorage.setItem("mons_currentIndex", savedIndex);
      localStorage.setItem("mons_score", savedScore);
      localStorage.setItem("mons_quizEnabled", quizState);
      localStorage.setItem("mons_quizRestored", "true");

      window.location.href = "culture.html";
    });

    // Écouter les changements de langue
    document.addEventListener('languageChanged', function(event) {
      currentLanguage = event.detail.language;
      updateContent();
    });

    // Charger les traductions au chargement de la page
    document.addEventListener('DOMContentLoaded', function() {
      // Forcer la mise à jour du cache en ajoutant un timestamp
      
      loadTranslations();
      initLanguageSelector();
      
      // Vérifier que le nouveau sélecteur est bien présent
      setTimeout(() => {
        const newSelector = document.getElementById('language-selector');
        if (newSelector) {
        } else {
        }
      }, 1000);
    });</script></body></html>
