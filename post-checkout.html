<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Finalisation…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html,body { height:100%; margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { height:100%; display:flex; align-items:center; justify-content:center; background:#111; color:#fff; }
    .card { background:#1f2937; padding:24px 28px; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.35); text-align:center; max-width:520px }
    .spinner { width:36px; height:36px; border:4px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; margin:0 auto 14px; animation:spin 1s linear infinite }
    @keyframes spin { to { transform: rotate(360deg) } }
    .muted { opacity:.8; font-size:14px }
  </style>

  <!-- même config API que sur choose-access -->
  <script src="./api-base.js"></script>
  <!-- Helper de stockage IndexedDB -->
  <script src="storage-helper.js"></script>
  <!-- Ajout: manager de traductions pour i18n -->
  <script src="translations/translationManager.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="spinner"></div>
      <!-- Textes désormais traduisibles -->
      <h1 data-translate="post_checkout_title">Finalisation du paiement…</h1>
      <p class="muted" data-translate="post_checkout_subtitle">Un instant, nous activons votre accès.</p>
    </div>
  </div>

  <!-- Appliquer la langue + traductions au chargement -->
  <script>
    (function () {
      function resolveLang() {
        const urlLang = new URLSearchParams(location.search).get('lang');
        if (urlLang) return urlLang;
        const ls = localStorage.getItem('selectedLanguage') || localStorage.getItem('lang');
        return ls || 'fr';
      }
      const lang = resolveLang();
      try { document.documentElement.setAttribute('lang', lang); } catch(_) {}
      localStorage.setItem('selectedLanguage', lang);

      function applyTranslations() {
  if (window.translationManager && window.translationManager.loadTranslations) {
    window.translationManager.loadTranslations('translations/translations_install.json')
      .then(() => {
        window.translationManager.setLanguage(lang);
        document.querySelectorAll('[data-translate]').forEach(el => {
          const key = el.getAttribute('data-translate');
          const t = window.translationManager.translate(key);
          if (t) el.textContent = t;
        });
      })
      .catch(err => console.error('[post-checkout] erreur de chargement des traductions:', err));
  } else {
    setTimeout(applyTranslations, 60);
  }
}
applyTranslations();

    })();
  </script>

  <script>
    (async function () {
      // --- Résolution API : lit api-base.js ---
      function getApiBase() {
        if (window.APP_CONFIG && window.APP_CONFIG.API_BASE) {
          return window.APP_CONFIG.API_BASE.replace(/\/+$/, '');
        }
        const saved = localStorage.getItem('api_base');
        if (saved) return saved.replace(/\/+$/, '');
        return window.location.origin.replace(':5173', ':8080').replace(/\/+$/, '');
      }
      const API_BASE = getApiBase();

      // cible warning = index.html?lang=…&from=checkout
      function resolveLang() {
        const urlLang = new URLSearchParams(location.search).get('lang');
        if (urlLang) return urlLang;
        const ls = localStorage.getItem('selectedLanguage') || localStorage.getItem('lang');
        return ls || 'fr';
      }
      const lang = resolveLang();
      const WARNING_PAGE = `index.html?lang=${encodeURIComponent(lang)}&from=checkout`;
      const FALLBACK_PAGE = `choose-access.html?lang=${encodeURIComponent(lang)}`;

      const params = new URLSearchParams(location.search);
      const sessionId = (params.get('session_id') || '').trim();


      if (!sessionId) {
        alert("Paiement refusé ou annulé. Réessayez.");
        location.replace(FALLBACK_PAGE);
        return;
      }

      try {
  // --- Helpers retry ---
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  const claimOnce = async () => {
    // Utiliser l'endpoint aligné avec ton backend actuel
    const url = `${API_BASE}/api/auth/claim-session?session_id=${encodeURIComponent(sessionId)}`;
    const res = await fetch(url, {
      method: 'GET',
      cache: 'no-store',
      headers: {
        'ngrok-skip-browser-warning': 'true'
      }
    });

    // Lire la réponse en texte d'abord pour gérer les erreurs
    const rawText = await res.text();

    // Vérifier si la réponse est HTML (ngrok warning page)
    if (rawText.trim().startsWith('<!DOCTYPE html>') || rawText.includes('ngrok')) {
      console.error('[post-checkout] Réponse HTML détectée (probable page d\'avertissement ngrok)');
      const err = new Error('L\'API a retourné une page HTML au lieu de JSON. Vérifiez que l\'en-tête ngrok-skip-browser-warning est bien envoyé.');
      err.httpStatus = res.status;
      err.rawText = rawText;
      throw err;
    }

    let data = null;
    try {
      data = rawText ? JSON.parse(rawText) : null;
    } catch (parseError) {
      console.error('[post-checkout] JSON parse error:', parseError);
      console.error('[post-checkout] Response was (premiers 500 chars):', rawText.substring(0, 500));
      const err = new Error('Réponse invalide de l\'API - format JSON attendu');
      err.httpStatus = res.status;
      err.rawText = rawText;
      throw err;
    }

    if (!res.ok || !data || !data.token) {
      const errorMsg = (data && (data.error || data.message)) || `http_${res.status}`;
      console.error('[post-checkout] Erreur API:', errorMsg, data);

      const err = new Error(errorMsg);
      err.httpStatus = res.status;
      err.data = data;
      err.rawText = rawText;
      throw err;
    }

    return data;
  };

  // Delais progressifs : utile si le webhook met quelques secondes à créer la licence
  const delays = [0, 800, 1500, 2500, 4000];

  let data = null;
  let lastErr = null;

  for (let attempt = 0; attempt < delays.length; attempt++) {
    if (delays[attempt]) await sleep(delays[attempt]);

    try {
      data = await claimOnce();
      break; // ✅ token obtenu
    } catch (e) {
      lastErr = e;

      const status = e?.httpStatus ?? 0;
      const msg = String(e?.message || '').toLowerCase();

      // Retry uniquement pour "pas prêt / introuvable" (course avec le webhook)
      const retryable =
        status === 404 ||
        status === 409 ||
        msg.includes('not found') ||
        msg.includes('introuvable') ||
        msg.includes('pending') ||
        msg.includes('en cours') ||
        msg.includes('not_ready') ||
        msg.includes('not ready') ||
        msg.includes('processing');

      // Si c'est une vraie erreur (400/401/403/500...) -> stop direct
      if (!retryable) throw e;

      console.warn(`[post-checkout] claim-session pas prêt (tentative ${attempt + 1}/${delays.length})`, e?.message || e);
    }
  }

  if (!data || !data.token) {
    console.error('[post-checkout] Echec claim-session après retries:', lastErr);
    throw lastErr || new Error('Activation non confirmée après plusieurs tentatives.');
  }

  // --- Stockage licence / token ---
  localStorage.setItem('clq_token', data.token);
  localStorage.setItem('jwt', data.token); // Compatibilité avec app.js
  localStorage.setItem('clq_has_access', '1');
  try { sessionStorage.removeItem('expired_popup_acknowledged'); } catch (_) {}

  // IMPORTANT : Sauvegarder dans IndexedDB pour l'app installée
  // Attendre que storageHelper soit chargé (peut prendre quelques ms)
  let storageHelperReady = false;
  for (let i = 0; i < 20; i++) {
    if (window.storageHelper) {
      storageHelperReady = true;
      break;
    }
    await new Promise(resolve => setTimeout(resolve, 50));
  }

  if (storageHelperReady) {
    try {
      await window.storageHelper.savePurchaseData({
        clq_token: data.token,
        jwt: data.token,
        clq_has_access: '1',
        selectedLanguage: localStorage.getItem('selectedLanguage') || 'fr',
        user_version: 'FULL'
      });
    } catch (error) {
      console.error('[post-checkout] ❌ Erreur lors de la sauvegarde dans IndexedDB:', error);
    }
  } else {
    // Sauvegarde directe dans IndexedDB si storageHelper n'est pas disponible
    try {
      const db = await new Promise((resolve, reject) => {
        const request = indexedDB.open('cityloopquest_db', 1);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains('app_data')) {
            db.createObjectStore('app_data');
          }
        };
      });

      const transaction = db.transaction(['app_data'], 'readwrite');
      const store = transaction.objectStore('app_data');
      await Promise.all([
        store.put(data.token, 'clq_token'),
        store.put(data.token, 'jwt'),
        store.put('1', 'clq_has_access'),
        store.put(localStorage.getItem('selectedLanguage') || 'fr', 'selectedLanguage'),
        store.put('FULL', 'user_version')
      ]);
    } catch (error) {
      console.error('[post-checkout] ❌ Erreur lors de la sauvegarde directe dans IndexedDB:', error);
    }
  }

  // TOUJOURS sauvegarder le code, même s'il n'est pas dans data.short_code
  // Le code peut être dans data.code ou ailleurs
  let codeToSave = null;
  if (data.short_code) {
    codeToSave = data.short_code;
  } else if (data.code) {
    codeToSave = data.code;
  }

  if (codeToSave) {
    // Normaliser le code avant de le sauvegarder
    let normalizedCode = String(codeToSave).toLowerCase().replace(/[^a-z0-9]/g, '');
    if (normalizedCode.length >= 9) {
      normalizedCode = normalizedCode.slice(0, 9).match(/.{1,3}/g).join('-');
    }
    localStorage.setItem('clq_short_code', normalizedCode);

    // IMPORTANT : Sauvegarder aussi dans un cookie (expiration 7 jours = validité du code)
    // Les cookies peuvent être partagés entre navigateur et app installée sur certaines plateformes
    const expirationDate = new Date();
    expirationDate.setDate(expirationDate.getDate() + 7); // 7 jours (validité du code)
    const selectedLang = localStorage.getItem('selectedLanguage') || 'fr';

    // Sauvegarder le code dans le cookie
    document.cookie = `clq_short_code=${normalizedCode}; expires=${expirationDate.toUTCString()}; path=/; SameSite=Lax`;
    // Sauvegarder aussi la langue dans le cookie
    document.cookie = `clq_selected_language=${selectedLang}; expires=${expirationDate.toUTCString()}; path=/; SameSite=Lax`;

    // Sauvegarder aussi dans IndexedDB
    if (window.storageHelper) {
      try {
        await window.storageHelper.saveData('clq_short_code', normalizedCode);
      } catch (error) {
        console.error('[post-checkout] ❌ Erreur sauvegarde code dans IndexedDB:', error);
      }
    } else {
      // Sauvegarde directe si storageHelper n'est pas disponible
      try {
        const db = await new Promise((resolve, reject) => {
          const request = indexedDB.open('cityloopquest_db', 1);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result);
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('app_data')) {
              db.createObjectStore('app_data');
            }
          };
        });
        const transaction = db.transaction(['app_data'], 'readwrite');
        const store = transaction.objectStore('app_data');
        await store.put(normalizedCode, 'clq_short_code');
      } catch (error) {
        console.error('[post-checkout] ❌ Erreur sauvegarde directe code dans IndexedDB:', error);
      }
    }
  }

  // Logs de débogage pour vérifier que tout est bien sauvegardé
  const postCheckoutState = {
    clq_token: !!localStorage.getItem('clq_token'),
    jwt: !!localStorage.getItem('jwt'),
    clq_has_access: localStorage.getItem('clq_has_access'),
    clq_short_code: localStorage.getItem('clq_short_code'),
    selectedLanguage: localStorage.getItem('selectedLanguage')
  };

  // Message de débogage visible (pour mobile)
  if (localStorage.getItem('debug_mode') === 'true') {
    alert(`Code sauvegardé !\nCode: ${postCheckoutState.clq_short_code || 'AUCUN'}\nToken: ${postCheckoutState.clq_token ? 'OUI' : 'NON'}\nLangue: ${postCheckoutState.selectedLanguage || 'non définie'}`);
  }
  if (data.entitlements) {
    localStorage.setItem('clq_entitlements', JSON.stringify(data.entitlements));
  }
  if (data.city_slug) {
    localStorage.setItem('clq_city', data.city_slug);
  }
  localStorage.setItem('clq_last_checkout', new Date().toISOString());

  const userVersion = 'FULL';
  localStorage.setItem('user_version', userVersion);

  // Rafraîchir le token silencieusement
  try {
    const refreshRes = await fetch(`${API_BASE}/api/auth/refresh`, {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${data.token}`,
        'ngrok-skip-browser-warning': 'true'
      }
    });
    if (refreshRes.ok) {
      const refreshData = await refreshRes.json().catch(() => null);
      if (refreshData && refreshData.token) {
        localStorage.setItem('clq_token', refreshData.token);
        localStorage.setItem('jwt', refreshData.token);
      }
    }
  } catch (refreshError) {
  }

  // Flux spécial : upgrade
  const upgradeType = localStorage.getItem('upgrade_type');
  const savedState = localStorage.getItem('user_state_before_upgrade');

  if (upgradeType === 'UPGRADE_FULL' && savedState) {
    try {
      const state = JSON.parse(savedState);
      let targetUrl = state.lastUrl || (state.currentPath ? (state.currentPath + (state.currentSearch || '') + (state.currentHash || '')) : null) || 'main.html';
      localStorage.setItem('user_version', 'FULL');
      location.replace(targetUrl);
      return;
    } catch (parseError) {
      console.error('[post-checkout] Erreur lors du parsing de l\'état sauvegardé:', parseError);
    }
  }

  // Redirection normale (achat initial) vers la page d'avertissement
  location.replace(WARNING_PAGE);

} catch (error) {
  console.error('[post-checkout] Erreur lors du claim:', error);
  console.error('[post-checkout] Stack:', error.stack);
  alert('Erreur lors de l\'activation. Veuillez contacter le support.');
  location.replace(FALLBACK_PAGE);
}

    })();

  </script>
</body>
</html>
