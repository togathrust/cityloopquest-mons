<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CityLoop Quest Mons - La Chevauchée de Saint Georges</title>
<link href="style.css" rel="stylesheet"/>
<script src="translations/translationManager.js"></script>
<script src="translations/languageSelector.js"></script>
<script>window.REQUIRES_FULL = true;</script>
<script src="api-base.js"></script>
<script src="js/access-control.js"></script>

<!-- Garde d'accès : bloque l'accès si aucun code d'activation valide (clq_short_code) -->
<script src="js/access-guard.js" defer></script>




<style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      /* background: #f5f5f5; */
    }
    main {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    button {
      font-size: 1.2rem;
      padding: 15px 25px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background-color: #336699;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #274d73;
    }
    iframe {
      width: 90%;
      height: 70vh;
      border: none;
      margin-top: 20px;
    }

.back-button {
  position: fixed;
  top: 50%;
  right: 10px;
  transform: translateY(-50%);
  z-index: 1000;
  padding: 10px 14px;
  background-color: #c8102e;
  color: white;
  font-size: 16px;
  border: none;
  border-radius: 8px 0 0 8px;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <img src="images/icone titre0.png" alt="Icone 0" class="header-img left">
        <h1 id="mainTitle" data-translate="title_chevauchee">CityLoop Quest Mons - La Chevauchée de Saint Georges</h1>
        <img src="images/icone titre1.png" alt="Icone 1" class="header-img right">
    </div>
</header>
<main>
<button onclick="location.href='personnalites-montoises.html'" id="personnalitesMontoisesBtn">
      🎓 Personnalités montoises
    </button>
<button onclick="location.href='artistes_celebres.html'" id="artistesCelebresBtn">
      🎨 Artistes célèbres
    </button>
<iframe id="content-frame" src="" style="display:none;"></iframe>
</main>


<button class="back-button" id="back-button">BACK</button>
<script>
// Charger les traductions
let translations = {};

async function loadTranslations() {
    try {
        const response = await fetch('translations/translations_personnalites.json');
        translations = await response.json();
        applyTranslations();
    } catch (error) {
        console.error('Erreur lors du chargement des traductions:', error);
    }
}

function changeLanguage(lang) {
    localStorage.setItem('selectedLanguage', lang);
    applyTranslations();
}

// Initialiser le sélecteur de langue personnalisé
function initLanguageSelector() {
    // Supprimer l'ancien sélecteur s'il existe encore
    const oldSelector = document.querySelector('.language-selector');
    if (oldSelector) {
        oldSelector.remove();
    }
    
    if (window.languageSelector) {
        window.languageSelector.createSelector();
        window.languageSelector.updateSelectorValue();
    }
}

function applyTranslations() {
    const lang = localStorage.getItem('selectedLanguage') || 'fr';
    const t = translations[lang] || translations.fr;
    
    // Mettre à jour le sélecteur de langue personnalisé
    if (window.languageSelector) {
        window.languageSelector.updateSelectorValue();
    }
    
    if (document.getElementById('mainTitle')) {
        document.getElementById('mainTitle').textContent = t.mainTitle;
    }
    if (document.getElementById('personnalitesMontoisesBtn')) {
        document.getElementById('personnalitesMontoisesBtn').textContent = t.personnalitesMontoises;
    }
    if (document.getElementById('artistesCelebresBtn')) {
        document.getElementById('artistesCelebresBtn').textContent = t.artistesCelebres;
    }
    if (document.getElementById('back-button')) {
        document.getElementById('back-button').textContent = t.backButton;
    }
}

// Initialiser les traductions au chargement de la page
document.addEventListener('DOMContentLoaded', function() {
    // Forcer la mise à jour du cache en ajoutant un timestamp
    
    loadTranslations();
    initLanguageSelector();
    
    // Vérifier que le nouveau sélecteur est bien présent
    setTimeout(() => {
        const newSelector = document.getElementById('language-selector');
        if (newSelector) {
        } else {
        }
    }, 1000);
});

// Écouter les changements de langue
document.addEventListener('languageChanged', function(event) {
    applyTranslations();
});

document.addEventListener("DOMContentLoaded", () => {
  const backButton = document.getElementById("back-button");
  if (backButton) {
    backButton.addEventListener("click", () => {
      window.location.href = "culture.html";
    });
  }
});
</script>
</body>
</html>
