<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CLQ — Google Maps</title>
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --clq-red: #b30000;
      --clq-bg: #f5f6f8;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--clq-bg);
      color: #161616;
      padding-top: calc(56px + var(--safe-top));
      padding-bottom: var(--safe-bottom);
      min-height: 100dvh;
    }
    .maps-bridge-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      display: flex;
      align-items: stretch;
      padding: calc(8px + var(--safe-top)) 10px 8px;
      background: var(--clq-red);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
    }
    .maps-bridge-back-btn {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--clq-red);
      background: #fff;
      cursor: pointer;
    }
    .maps-bridge-back-btn:active {
      transform: scale(0.98);
    }
    .maps-bridge-main {
      max-width: 28rem;
      margin: 0 auto;
      padding: 24px 20px;
      text-align: center;
    }
    .maps-bridge-main h1 {
      font-size: 1.25rem;
      margin: 0 0 12px;
    }
    .maps-bridge-hint {
      color: #444;
      line-height: 1.45;
      margin: 0 0 24px;
      font-size: 0.95rem;
    }
    .maps-bridge-open-btn {
      display: block;
      width: 100%;
      border: 2px solid var(--clq-red);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      background: var(--clq-red);
      cursor: pointer;
    }
    .maps-bridge-open-btn:active {
      opacity: 0.9;
    }
    .maps-bridge-logo {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }
  </style>
  <script src="translations/translationManager.js"></script>
</head>
<body>
  <header class="maps-bridge-bar" role="banner">
    <button type="button" id="maps-bridge-back" class="maps-bridge-back-btn">
      ← Retour à CLQ
    </button>
  </header>
  <main class="maps-bridge-main">
    <div class="maps-bridge-logo" aria-hidden="true">🗺️</div>
    <h1 id="maps-bridge-title">Navigation Google Maps</h1>
    <p id="maps-bridge-hint" class="maps-bridge-hint">
      Pour revenir à l'application : touche Retour du navigateur après la navigation, puis le bouton rouge en haut.
    </p>
    <button type="button" id="maps-bridge-open" class="maps-bridge-open-btn">
      Continuer vers Google Maps
    </button>
  </main>
  <script src="js/clq-maps-launch.js"></script>
  <script src="js/maps-bridge.js"></script>
</body>
</html>
